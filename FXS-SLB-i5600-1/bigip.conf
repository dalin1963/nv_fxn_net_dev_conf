ltm rule /Common/irule_tftp {
when SERVER_CONNECTED {
   listen {
     proto 17
     timeout 60
     bind [LINK::vlan_id] [IP::local_addr] [serverside {UDP::local_port}]
     server [peer {client_addr}] [peer {UDP::client_port}]
     allow [IP::server_addr]
   }
 }
}

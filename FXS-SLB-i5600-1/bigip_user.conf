#TMSH-VERSION: 16.1.3.4

auth user admin {
    description "Admin User"
    partition-access {
        all-partitions {
            role admin
        }
    }
    session-limit -1
    shell none
}
auth user f5hubblelcdadmin {
    description f5hubblelcdadmin
    partition-access {
        all-partitions {
            role admin
        }
    }
    session-limit -1
    shell none
}
auth user root {
    description root
    session-limit -1
    shell bash
}

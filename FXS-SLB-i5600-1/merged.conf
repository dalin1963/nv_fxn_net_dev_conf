#
#  Snapshot Config
#
# Note: each interval must be an integer multiple of the prior level.
# Time is in seconds.  Common terms:
# 60 = 1 minute
# 300 = 5 minutes
# 3600 = 1 hour
# 10800 = 3 hours
# 86400 = 1 day
# 604800 = 1 week
# 2419200 = 4 weeks
# 31449600 = 52 weeks
# 1296000 = 15 days (1/2 month)
# 2592000 = 1 month (30 days)
# 31536000 = 1 year (365 days)

# Default is every 1 hour for 1 day (24 snapshots)
snapshots.category.default=3600,86400

# Public is every 1 hour for 1 day (24), then every 1 day for 1 week (7)
snapshots.category.public=3600,86400,604800

# Internal is disabled (0 snapshots)
snapshots.category.internal=0

# Performance is every 10 seconds for 10 minutes (60), then every 10 minutes
#   for 3 hours (18), then every 3 hours for 1 week (56)
snapshots.category.performance=10,600,10800,604800

# Maximum amount of disk space allowed for snapshots per blade
snapshots.limit.blade=2GB


